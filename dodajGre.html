<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Daniel Games</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="icon" href="src/img/logo.png" />
</head>
<body>
<div class="header">
    <div class="header-left">
        <div class="logo">
            <img src="src/img/logo.png" alt="logo" />
        </div>
    </div>
    <div class="header-center">
        <a href="/index.html" style="color: #ea638c;">Biblioteka</a> |
        <a href="/dodajGre.html" style="color: #fff;">Dodaj gre</a> |
        <a href="/oNas.html" style="color: #ea638c;">O nas</a>
    </div>
    <div class="header-right">
        <div class="name">
            <h1>random</h1>
        </div>
        <div class="avatar">
            <img src="src/img/avatar.jpg" alt="avatar" />
        </div>
    </div>
</div>

<div class="backdrop">
    <div class="menu">
        <div class="left">
            <div class="add-game">
                <h2>Dodaj gre</h2>
                <form action="/dodajGre" method="post" class="styled-form">
                    <label>
                        <input type="text" name="title" placeholder="Tytuł gry" required />
                    </label>
                    <label>
                        <input type="text" name="trudnosc" placeholder="Trudnosc w gwiazdach x/5" required />
                    </label>

                    <div class="checkbox-group">
                        <input type="checkbox" name="daniel" id="daniel" value="daniel" required />
                        <label for="daniel"> Czy w grze jest Daniel</label>
                    </div>

                    <label>
                        <input type="number" name="releaseYear" placeholder="Rok wydania" required />
                    </label>

                    <label>
                        <input list="ograniczeniaWiekowe" name="wiek" placeholder="Ograniczenia wiekowe" required>
                    </label>
                    <datalist id="ograniczeniaWiekowe">
                        <option value="Kazdy wiek"></option>
                        <option value="3+"></option>
                        <option value="7+"></option>
                        <option value="12+"></option>
                        <option value="16+"></option>
                        <option value="18+"></option>
                    </datalist>

                    <button type="submit">Dodaj gre</button>
                </form>
            </div>
        </div>

        <div class="right">
            <div class="dodajObrazek">
                <h2>Dodaj obrazek</h2>
                <form action="/dodajObrazek" method="post" enctype="multipart/form-data" class="styled-form">
                    <input type="file" name="image" required />
                    <button type="submit">Dodaj</button>
                </form>
            </div>
        </div>
    </div>
</div> <div class="footer">
    <p>Daniel Games ©</p>
</div>
</body>
</html>
