<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Daniel Games</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="icon" href="src/img/logo.png" />
</head>
<body>
<div class="header">
    <div class="header-left">
        <div class="logo">
            <img src="src/img/logo.png" alt="logo" />
        </div>
    </div>
    <div class="header-center">
        <a href="/index.html" style="color: #ea638c;">Biblioteka</a> |
        <a href="/dodajGre.html" style="color: #ea638c;">Dodaj gre</a> |
        <a href="/oNas.html" style="color: #ea638c;">O nas</a>
    </div>
    <div class="header-right">
        <div class="name">
            <h1>random</h1>
        </div>
        <div class="avatar">
            <img src="src/img/avatar.jpg" alt="avatar" />
        </div>
    </div>
</div>
<div class="menu">
    <div class="left">
        <div class="add-game">
            <h2>Dodaj gre</h2>
            <form action="/dodajGre" method="post">
                <input type="text" name="title" placeholder="Tytuł gry" required />
                <input type="text" name="trudnosc" placeholder="Trudnosc w gwiazdach x/5" required />
                <input type="checkbox" name="daniel" id="daniel" value="daniel" required />
                <label for="daniel"> Czy w grze jest Daniel</label><br>
                <input type="number" name="releaseYear" placeholder="Rok wydania" required />
                <button type="submit">Dodaj gre</button>
            </form>
    </div>
</div>
    <div class="right">
        <div class="dodajObrazek">
            <h2>Dodaj obrazek</h2>
            <form action="/dodajObrazek" method="post" enctype="multipart/form-data">
                <input type="file" name="image" required />
                <button type="submit">Dodaj</button>
            </form>
    </div>
<div class="footer">
    <p>Daniel Games ©</p>
</div>
</body>
</html>
