<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanielGames – Dodaj grę</title>

    <link rel="stylesheet" href="src/css/style.css"/>
    <link rel="icon" href="src/img/logo.png"/>
    <script src="src/java/dodajGre.js" defer></script>
</head>

<body>

<header class="header">
    <div class="header-left">
        <a href="index.html" class="logo-container" aria-label="Strona główna">
            <img src="src/img/logo.png" alt="Logo DanielGames" class="logo-normal"/>
            <img src="src/img/logo1.png" alt="" class="logo-on-hover"/>
        </a>
    </div>

    <nav class="header-center" aria-label="Nawigacja">
        <ul class="nav-list">
            <li><a href="index.html">Biblioteka</a></li>
            <li><a href="dodajGre.html" class="active-link">Dodaj grę</a></li>
            <li><a href="oNas.html">O nas</a></li>
        </ul>
    </nav>

    <div class="header-right">
        <span class="username" style="font-size: 1.5em; font-weight: bold;">random</span>

        <div class="avatar">
            <img src="src/img/avatar.jpg" alt="Avatar użytkownika"/>
        </div>
    </div>
</header>


<div class="layout">

    <main class="content">

        <form class="add-form">

            <div class="form-row">
                <label for="title">Nazwa gry</label>
                <input type="text" id="title" name="title" placeholder="Wprowadź nazwę..." required>
            </div>

            <div class="form-row">
                <label for="trudnosc">Trudność</label>
                <input type="text" id="trudnosc" name="trudnosc" placeholder="x/5" required>
            </div>

            <div class="form-row">
                <label for="image">Okładka</label>
                <input type="file" id="image" name="image" required>
                <img id="preview" class="cover-preview" alt="Podgląd okładki">
            </div>

            <div class="form-row">
                <label for="wiek">PG</label>
                <input list="ograniczeniaWiekowe" id="wiek" name="wiek" placeholder="Wybierz..." required>
                <datalist id="ograniczeniaWiekowe">
                    <option value="Każdy wiek"></option>
                    <option value="3+"></option>
                    <option value="7+"></option>
                    <option value="12+"></option>
                    <option value="16+"></option>
                    <option value="18+"></option>
                </datalist>
            </div>

            <div class="form-row checkbox-row">
                <label for="daniel">Czy jest Daniel?</label>
                <input type="checkbox" id="daniel" name="daniel">
            </div>

            <div class="form-row">
                <label for="releaseYear">Rok wydania</label>
                <input type="number" id="releaseYear" name="releaseYear" placeholder="np. 2023" required>
            </div>

            <div class="form-buttons">
                <button type="reset" class="buttonDark">Anuluj</button>
                <button type="submit" class="buttonBright">Zapisz</button>
            </div>

        </form>

    </main>

</div>

<footer class="footer">
    <p>DanielGames ©</p>
    <button class="accessibility" aria-label="Tryb dostępności">K</button>
</footer>

<script src="src/java/przyciskDostepu.js"></script>

<script>
document.getElementById("image").addEventListener("change", function () {
    const file = this.files[0];
    const preview = document.getElementById("preview");

    if (!file) {
        preview.style.display = "none";
        preview.src = "";
        return;
    }

    const reader = new FileReader();
    reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);
});
</script>

</body>
</html>
